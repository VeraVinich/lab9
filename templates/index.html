<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Коллекция игр</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        
        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 16px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
        }
        
        th {
            background: #f8f9fa;
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid #dee2e6;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #dee2e6;
        }
        
        .year {
            font-weight: bold;
            color: #e67e22;
        }
        
        .delete-btn {
            background: #dc3545;
            padding: 5px 10px;
            width: auto;
            font-size: 12px;
        }
        
        .empty {
            text-align: center;
            color: #999;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Моя коллекция игр 🎮</h1>
        
        <h2>Добавить игру</h2>
        <form method="POST" action="/add">
            <div class="form-group">
                <label>Название игры:</label>
                <input type="text" name="name" required>
            </div>
            
            <div class="form-group">
                <label>Год издания:</label>
                <input type="number" name="year" required>
            </div>
            
            <button type="submit">Добавить</button>
        </form>
        
        <h2>Пройденные игры:</h2>
        
        {% if games %}
        <table>
            <thead>
                <tr>
                    <th>Название</th>
                    <th>Год издания</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                {% for game in games %}
                <tr>
                    <td>{{ game.name }}</td>
                    <td class="year">{{ game.year }}</td>
                    <td>
                        <form method="POST" action="/delete/{{ game.id }}" style="display: inline;">
                            <button type="submit" class="delete-btn">Удалить</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <div class="empty">
            Пока нет добавленных игр
        </div>
        {% endif %}
    </div>
</body>
</html>
